    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: #0d0d0d;
        font-family: "Inter", sans-serif;
      }

      /* Gradient overlay for hero image */
      .hero-overlay {
        background: linear-gradient(
          to bottom,
          rgba(13, 13, 13, 0.15) 0%,
          rgba(13, 13, 13, 0.55) 55%,
          rgba(13, 13, 13, 1) 100%
        );
      }

      /* Gold shimmer underline */
      .gold-bar::after {
        content: "";
        display: block;
        width: 48px;
        height: 3px;
        background: #f5b700;
        border-radius: 2px;
        margin-top: 6px;
      }

      /* Responsive 16:9 iframe */
      .video-wrapper {
        position: relative;
        padding-top: 56.25%;
        border-radius: 12px;
        overflow: hidden;
      }

      .video-wrapper iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Stat row hover */
      .stat-row:hover {
        background: #202020;
      }

      .stat-row:nth-child(even) {
        background: #181818;
      }

      .stat-row:nth-child(even):hover {
        background: #202020;
      }

      /* Badge shimmer */
      .badge-primary {
        background: linear-gradient(135deg, #f5b700, #e09b00);
        color: #0d0d0d;
      }

      .badge-secondary {
        background: transparent;
        border: 1px solid #f5b700;
        color: #f5b700;
      }

      /* Sticky CTA shadow */
      .cta-bar {
        box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(12px);
        background: rgba(13, 13, 13, 0.92);
      }

      /* Fade-in on scroll */
      .reveal {
        opacity: 0;
        transform: translateY(24px);
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }

      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* EU badge special glow */
      .eu-badge {
        background: linear-gradient(135deg, #003399, #ffcc00);
      }

      /* Position map field */
      .pitch-board {
        position: relative;
        width: 100%;
        max-width: 360px;
        margin: 0 auto;
        aspect-ratio: 3 / 4;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid rgba(230, 230, 230, 0.45);
        background:
          linear-gradient(180deg, #23704b 0%, #18573a 100%),
          repeating-linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.04) 0px,
            rgba(255, 255, 255, 0.04) 44px,
            rgba(255, 255, 255, 0.08) 44px,
            rgba(255, 255, 255, 0.08) 88px
          );
      }

      .pitch-mark {
        position: absolute;
        border: 2px solid rgba(255, 255, 255, 0.65);
      }

      .pitch-mark.midline {
        left: 0;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        border-width: 1.5px 0 0;
      }

      .pitch-mark.center-circle {
        width: 24%;
        aspect-ratio: 1;
        border-radius: 999px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .pitch-mark.box {
        width: 54%;
        height: 20%;
        left: 50%;
        transform: translateX(-50%);
        border-top: none;
      }

      .pitch-mark.box.top {
        top: 0;
      }

      .pitch-mark.box.bottom {
        bottom: 0;
        border-top: 2px solid rgba(255, 255, 255, 0.65);
        border-bottom: none;
      }

      .position-marker {
        position: absolute;
        left: var(--x);
        top: var(--y);
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .position-dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #f5b700;
        box-shadow: 0 0 0 4px rgba(245, 183, 0, 0.2);
      }

      .position-label {
        min-width: 42px;
        text-align: center;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: #0d0d0d;
        border-radius: 999px;
        padding: 4px 8px;
        background: linear-gradient(135deg, #f5b700, #e09b00);
        border: 1px solid rgba(13, 13, 13, 0.45);
      }

      /* Scrollbar minimal */
      ::-webkit-scrollbar {
        width: 4px;
      }

      ::-webkit-scrollbar-track {
        background: #0d0d0d;
      }

      ::-webkit-scrollbar-thumb {
        background: #2a2a2a;
        border-radius: 2px;
      }

      @media print {
        .cta-bar,
        .no-print {
          display: none !important;
        }

        body {
          background: white;
        }
      }
    </style>

    <!-- ── SCRIPTS ── -->
    <script>
      // ── Intersection Observer for reveal animations ──
      const observer = new IntersectionObserver(
        (entries) =>
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add("visible");
              observer.unobserve(e.target);
            }
          }),
        { threshold: 0.1 },
      );
      document
        .querySelectorAll(".reveal")
        .forEach((el) => observer.observe(el));

      // ── iOS safe area for CTA bar ──
      document.querySelector(".cta-bar").style.paddingBottom =
        "max(12px, env(safe-area-inset-bottom))";
